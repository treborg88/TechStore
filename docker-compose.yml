# =============================================================================
# TechStore â€” Docker Compose (Full Stack with PostgreSQL)
# =============================================================================
# Runs the full stack: PostgreSQL + backend (Express) + frontend (Nginx/Vite)
# behind an Nginx reverse proxy on port 80.
#
# Usage:
#   docker compose up --build          # Build and start
#   docker compose up -d               # Start in background
#   docker compose down                # Stop and remove
#   docker compose logs -f backend     # Follow backend logs
#
# Environment:
#   Copy .env.example to .env and fill in credentials,
#   or use the Setup Wizard at first boot (no .env needed).
#
# Database: PostgreSQL (local Docker container)
# =============================================================================

services:
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Database: PostgreSQL 14
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  database:
    image: postgres:14-alpine
    container_name: techstore-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-techstore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-techstore}
      POSTGRES_DB: ${POSTGRES_DB:-techstore}
    volumes:
      # Persist data between rebuilds
      - pgdata:/var/lib/postgresql/data
      # Auto-run schema + seed on first boot (order matters: 01â†’02â†’03)
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./backend/database/schema-saas.sql:/docker-entrypoint-initdb.d/03-schema-saas.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-techstore}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"
    networks:
      - techstore

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Backend: Express API on port 5001
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: techstore-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Docker-internal override â€” must use 'database' service hostname, not localhost
      DATABASE_URL: postgresql://${POSTGRES_USER:-techstore}:${POSTGRES_PASSWORD:-techstore}@database:5432/${POSTGRES_DB:-techstore}
      # CORS wildcard for all subdomains (local dev)
      CORS_ORIGIN: ${CORS_ORIGIN:-*.eonsclover.local}
      # All other SaaS vars (SAAS_MODE, PLATFORM_DOMAIN, SUPER_ADMIN_SECRET, etc.)
      # come from env_file: ./backend/.env â€” do not override here
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "5001:5001"
    volumes:
      # Persist uploaded images (postgres mode)
      - uploads:/app/backend/uploads
      # Persist logs
      - ./logs:/app/backend/logs
    networks:
      - techstore

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Frontend: Vite build served by Nginx on port 3000
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        # /api is relative â€” the proxy container handles routing
        VITE_API_URL: /api
    container_name: techstore-frontend
    restart: unless-stopped
    networks:
      - techstore

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Proxy: Nginx reverse proxy (entry point)
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Unifies frontend + backend on a single port.
  # - /api/*      â†’ backend:5001
  # - /storage/*  â†’ backend:5001  (images proxy)
  # - /p/*        â†’ backend:5001  (social sharing OG meta)
  # - /*          â†’ frontend:80   (SPA)
  proxy:
    image: nginx:alpine
    container_name: techstore-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - techstore

volumes:
  pgdata:
  uploads:

networks:
  techstore:
    driver: bridge
