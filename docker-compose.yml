# =============================================================================
# Eonsclover — Docker Compose (Full Stack with PostgreSQL)
# =============================================================================
# Runs the full stack: PostgreSQL + backend (Express) + frontend (Nginx/Vite)
# behind an Nginx reverse proxy on port 80.
#
# Usage:
#   docker compose up --build          # Build and start
#   docker compose up -d               # Start in background
#   docker compose down                # Stop and remove
#   docker compose logs -f backend     # Follow backend logs
#
# Environment:
#   Copy .env.example to .env and fill in credentials,
#   or use the Setup Wizard at first boot (no .env needed).
#
# Database: PostgreSQL (local Docker container)
# =============================================================================

services:
  # ─────────────────────────────────────────────
  # Database: PostgreSQL 14
  # ─────────────────────────────────────────────
  database:
    image: postgres:14-alpine
    container_name: eonsclover-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eonsclover}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eonsclover}
      POSTGRES_DB: ${POSTGRES_DB:-eonsclover}
    volumes:
      # Persist data between rebuilds
      - pgdata:/var/lib/postgresql/data
      # Auto-run schema + seed on first boot (order matters: 01→02→03)
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./backend/database/schema-saas.sql:/docker-entrypoint-initdb.d/03-schema-saas.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eonsclover}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"
    networks:
      - eonsclover

  # ─────────────────────────────────────────────
  # Backend: Express API on port 5001
  # ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    image: eonsclover-backend
    container_name: eonsclover-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Docker-internal override — must use 'database' service hostname, not localhost
      DATABASE_URL: postgresql://${POSTGRES_USER:-eonsclover}:${POSTGRES_PASSWORD:-eonsclover}@database:5432/${POSTGRES_DB:-eonsclover}
      # CORS wildcard for all subdomains (local dev)
      CORS_ORIGIN: ${CORS_ORIGIN:-*.eonsclover.local}
      # Override PLATFORM_DOMAIN for local dev (.env has eonsclover.com for production)
      PLATFORM_DOMAIN: ${PLATFORM_DOMAIN:-eonsclover.local}
      # Test bypass: these emails skip real email sending and accept code 000000.
      # Remove or leave empty in production.
      TEST_BYPASS_EMAIL: ${TEST_BYPASS_EMAIL:-test@playwright.local,@test.local}
      # Remaining SaaS vars (SUPER_ADMIN_SECRET, etc.) come from env_file: ./backend/.env
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "5001:5001"
    volumes:
      # Persist uploaded images (postgres mode)
      - uploads:/app/backend/uploads
      # Persist backup archives across container restarts
      - backups:/app/backend/backups
      # Persist logs
      - ./logs:/app/backend/logs
    networks:
      - eonsclover

  # ─────────────────────────────────────────────
  # Frontend: Vite build served by Nginx on port 3000
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        # /api is relative — the proxy container handles routing
        VITE_API_URL: /api
    image: eonsclover-frontend
    container_name: eonsclover-frontend
    restart: unless-stopped
    networks:
      - eonsclover

  # ─────────────────────────────────────────────
  # Proxy: Nginx reverse proxy (entry point)
  # ─────────────────────────────────────────────
  # Unifies frontend + backend on a single port.
  # - /api/*      → backend:5001
  # - /storage/*  → backend:5001  (images proxy)
  # - /p/*        → backend:5001  (social sharing OG meta)
  # - /*          → frontend:80   (SPA)

  # Adminer: lightweight DB web UI (localhost:8080)
  adminer:
    image: adminer:latest
    container_name: eonsclover-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - eonsclover
  proxy:
    image: nginx:alpine
    container_name: eonsclover-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - eonsclover

volumes:
  pgdata:
  uploads:
  backups:

networks:
  eonsclover:
    driver: bridge
